# Name of your application. Used to uniquely configure containers.
service: crewboard

# Name of the container image.
image: crewboard

# Where you keep your container images.
registry:
  server: localhost:5555

# Shared environment variables across all destinations.
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_PASSWORD
  clear:
    SOLID_QUEUE_IN_PUMA: true

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage for Active Storage files.
volumes:
  - "crewboard_storage:/rails/storage"

# Bridge fingerprinted assets between versions.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# ============================================================
# Destinations — deploy with: kamal deploy -d <destination>
# ============================================================

destinations:
  staging:
    servers:
      web:
        hosts:
          - 10.0.1.10  # PLACEHOLDER — replace with your staging server IP
    proxy:
      ssl: true
      host: staging.crewboard.com
    env:
      clear:
        RAILS_ENV: production
        DB_HOST: 10.0.1.20  # PLACEHOLDER — replace with your staging DB host
        RAILS_LOG_LEVEL: debug
        WEB_CONCURRENCY: 1

  production:
    servers:
      web:
        hosts:
          - 10.0.2.10  # PLACEHOLDER — replace with your production server IP
    proxy:
      ssl: true
      host: crewboard.com
    env:
      clear:
        RAILS_ENV: production
        DB_HOST: 10.0.2.20  # PLACEHOLDER — replace with your production DB host
        WEB_CONCURRENCY: 2
