# Name of your application. Used to uniquely configure containers.
service: crewboard

# Name of the container image.
image: rebelreever/crewboard

# Deploy to a single production server.
servers:
  web:
    hosts:
      - 139.162.197.173

# Container registry — Docker Hub
registry:
  username: rebelreever
  password:
    - KAMAL_REGISTRY_PASSWORD

# Configure the proxy (kamal-proxy handles SSL via Let's Encrypt).
proxy:
  ssl: true
  host: crew-board.io

# Environment variables.
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_PASSWORD
  clear:
    RAILS_ENV: production
    SOLID_QUEUE_IN_PUMA: true
    DB_HOST: crewboard-db
    WEB_CONCURRENCY: 2

# Persistent storage for Active Storage files.
volumes:
  - "crewboard_storage:/rails/storage"

# Bridge fingerprinted assets between versions.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# Accessories — PostgreSQL running on the same server.
accessories:
  db:
    image: postgres:16
    host: 139.162.197.173
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: crewboard
        POSTGRES_DB: crewboard_production
    directories:
      - crewboard_pgdata:/var/lib/postgresql/data
    files:
      - config/init.sql:/docker-entrypoint-initdb.d/init.sql

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"
